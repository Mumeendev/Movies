<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieLearn - Discover & Understand Movies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <span class="logo">🎬</span>
                <span class="brand-text">MovieLearn</span>
            </div>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="movies.html">Movies</a></li>
                <li><a href="#about">About</a></li>
            </ul>
            <div class="search-container" id="search-container">
                <input type="text" id="nav-search" class="nav-search" placeholder="Search movies..." autocomplete="off">
                <div id="search-results" class="search-results"></div>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="container">
            <h1 class="hero-title">Welcome, learn and understand some of your favourite movies</h1>
            <p class="hero-subtitle">Explore detailed insights, previews, and ratings of iconic films</p>
            <a href="movies.html" class="btn btn-primary">Explore Movies</a>
        </div>
    </section>

    <!-- Movies Section -->
    <section id="movies" class="movies-section">
        <div class="container">
            <h2 class="section-title">Featured Movies</h2>
            <div id="movies-grid" class="movies-grid"></div>
        </div>
    </section>

    <!-- Movie Preview Modal -->
    <div id="preview-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="about" class="footer">
        <div class="container">
            <p>&copy; 2026 MovieLearn. Learn, Explore, and Enjoy Movies.</p>
        </div>
    </footer>

    <script src="image-fallback.js"></script>
    <script src="script.js"></script>
</body>
</html>
