<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVMaze Search Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-box {
            position: relative;
            margin-bottom: 2rem;
        }

        #test-search {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            background: #2a2a2a;
            border: 2px solid #444;
            border-radius: 8px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        #test-search:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        #test-results {
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            max-height: 600px;
            overflow-y: auto;
        }

        .result-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #333;
            transition: background 0.2s ease;
        }

        .result-item:hover {
            background: #333;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-poster {
            width: 60px;
            height: 90px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            background: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.5);
        }

        .result-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-info {
            flex: 1;
            min-width: 0;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-meta {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }

        .result-desc {
            color: #666;
            font-size: 0.85rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tvmaze-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-left: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #888;
        }

        .loading span {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #888;
        }

        .instructions {
            background: #2a2a2a;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            border-left: 4px solid #667eea;
        }

        .instructions h3 {
            margin-bottom: 0.5rem;
            color: #667eea;
        }

        .instructions ul {
            margin-left: 1.5rem;
            color: #aaa;
        }

        .instructions li {
            margin-bottom: 0.3rem;
        }

        .instructions code {
            background: #1a1a1a;
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            color: #f093fb;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 TVMaze Search Test</h1>

        <div class="instructions">
            <h3>How to Test</h3>
            <ul>
                <li>Type any movie or TV show name in the search box</li>
                <li>Try: <code>Breaking Bad</code>, <code>Game of Thrones</code>, <code>Stranger Things</code></li>
                <li>Results will appear after 300ms delay (debounce)</li>
                <li>Local results vs TVMaze results will be visually different</li>
            </ul>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                id="test-search" 
                placeholder="Search for any movie or TV show..."
                autocomplete="off"
            >
        </div>

        <div id="test-results"></div>
    </div>

    <script src="tvmaze-search.js"></script>
    <script>
        const searchInput = document.getElementById('test-search');
        const resultsDiv = document.getElementById('test-results');
        let searchTimeout = null;

        // Sample local movies (simulating your database)
        const localMovies = [
            { title: "Naruto", year: 2002, category: "Anime", director: "Hayato Date" },
            { title: "Attack on Titan", year: 2013, category: "Anime", director: "Tetsuro Araki" },
            { title: "Squid Game", year: 2021, category: "Kdrama", director: "Hwang Dong-hyuk" }
        ];

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();

            if (query.length < 2) {
                resultsDiv.innerHTML = '';
                return;
            }

            if (searchTimeout) {
                clearTimeout(searchTimeout);
            }

            searchTimeout = setTimeout(async () => {
                resultsDiv.innerHTML = `
                    <div class="loading">
                        <span>🔍</span>
                        <p>Searching TVMaze API...</p>
                    </div>
                `;

                try {
                    // Search with fallback (combines local + TVMaze)
                    const results = await searchWithFallback(query, localMovies, 10);
                    displayResults(results, query);
                } catch (error) {
                    console.error('Search error:', error);
                    resultsDiv.innerHTML = `
                        <div class="no-results">
                            <p>Error searching. Please try again.</p>
                        </div>
                    `;
                }
            }, 300);
        });

        function displayResults(results, query) {
            if (results.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="no-results">
                        <p>No results found for "${query}"</p>
                    </div>
                `;
                return;
            }

            resultsDiv.innerHTML = results.map(result => {
                if (result.isFromTVMaze) {
                    return `
                        <div class="result-item">
                            <div class="result-poster">
                                ${result.image 
                                    ? `<img src="${result.image}" alt="${result.title}" onerror="this.parentElement.innerHTML='${result.title.charAt(0)}'">`
                                    : result.title.charAt(0)
                                }
                            </div>
                            <div class="result-info">
                                <div class="result-title">
                                    ${highlightText(result.title, query)}
                                    <span class="tvmaze-badge">TVMaze</span>
                                </div>
                                <div class="result-meta">
                                    ${result.category} • ${result.year} • ${result.director}
                                </div>
                                <div class="result-desc">${result.description}</div>
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="result-item">
                            <div class="result-poster">
                                ${result.title.charAt(0)}
                            </div>
                            <div class="result-info">
                                <div class="result-title">${highlightText(result.title, query)}</div>
                                <div class="result-meta">
                                    ${result.category} • ${result.year} • ${result.director}
                                </div>
                                <div class="result-desc">Local database result</div>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        function highlightText(text, query) {
            const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
            return text.replace(regex, '<mark style="background: #667eea; color: #fff; padding: 0 2px; border-radius: 2px;">$1</mark>');
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // Focus the search box on load
        searchInput.focus();
    </script>
</body>
</html>
